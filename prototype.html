<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人研发知识库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f7fa;
            --bg-gradient: linear-gradient(180deg, #f8fafc 0%, #ffffff 100%);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --accent-color: #2563eb;
            --accent-hover: #1d4ed8;
            --border-color: #e2e8f0;
            --border-light: #f1f5f9;
            --card-bg: #ffffff;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.08);
            --header-height: 72px;
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-gradient);
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* 顶部导航 */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-height);
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            padding: 0 32px;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }

        .logo {
            position: absolute;
            left: 200px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 600;
            color: var(--accent-color);
            cursor: pointer;
            z-index: 10;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--accent-color), #3b82f6);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: white;
        }

        .nav-tabs {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 32px;
            margin: 0 32px;
        }

        .nav-tab {
            position: relative;
            font-size: 20px;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px 0;
            transition: color 0.2s;
        }

        .nav-tab:hover {
            color: var(--text-primary);
        }

        .nav-tab.active {
            color: var(--accent-color);
            font-weight: 500;
        }

        .nav-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 3px;
            background: var(--accent-color);
            border-radius: 2px;
        }

        .nav-divider {
            width: 1px;
            height: 24px;
            background: var(--border-color);
            margin: 0 12px;
        }

        .header-actions {
            position: absolute;
            right: 120px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10;
        }

        .search-box {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0 16px;
            width: 320px;
            height: 40px;
            transition: all 0.2s;
        }

        .search-box:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .search-box input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            height: 100%;
            font-size: 15px;
            color: var(--text-primary);
            padding-right: 30px;
        }

        .search-box input::placeholder {
            color: var(--text-muted);
        }

        .search-box svg {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: var(--text-muted);
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: var(--text-secondary);
        }

        .icon-btn:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        /* 主题切换开关 */
        .theme-toggle {
            position: relative;
            width: 52px;
            height: 26px;
            border: 1px solid var(--border-color);
            border-radius: 13px;
            background: transparent;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            transition: border-color 0.2s;
            flex-shrink: 0;
            overflow: hidden;
        }

        .theme-toggle:hover {
            border-color: var(--accent-color);
        }

        .toggle-track {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .toggle-icon {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

        .toggle-icon.sun {
            left: 5px;
            opacity: 1;
            transform: translateY(-50%) translateX(0);
        }

        .toggle-icon.moon {
            right: 5px;
            opacity: 0;
            transform: translateY(-50%) translateX(10px);
        }

        .theme-toggle.dark .toggle-icon.sun {
            opacity: 0;
            transform: translateY(-50%) translateX(-10px);
        }

        .theme-toggle.dark .toggle-icon.moon {
            opacity: 1;
            transform: translateY(-50%) translateX(0);
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 500;
            margin-left: 8px;
        }

        /* Hero 区域 */
        .hero-section {
            padding: calc(var(--header-height) + 240px) 0 80px;
            display: flex;
            max-width: 1200px;
            margin: 0 auto;
            padding-left: 24px;
            padding-right: 24px;
            align-items: center;
        }

        .hero-content {
            flex: 1;
            text-align: center;
        }



        .hero-title {
            font-size: 48px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.1;
            margin-top: -40px;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }

        .hero-subtitle {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 32px;
            line-height: 1.7;
            transition: opacity 0.4s ease, transform 0.4s ease;
            min-height: 2em;
        }

        .hero-subtitle.slide-out {
            opacity: 0;
            transform: translateY(-8px);
        }

        .hero-subtitle.slide-in {
            opacity: 0;
            transform: translateY(8px);
        }

        .hero-subtitle::after {
            content: "|";
            animation: blink 1s step-end infinite;
            margin-left: 2px;
            color: var(--accent-color);
            font-weight: 300;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .hero-actions {
            display: flex;
            justify-content: center;
            gap: 14px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-primary {
            background: var(--accent-color);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--bg-secondary);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        /* 右侧插画 */
        .hero-illustration {
            flex: 1;
            display: flex;
            justify-content: center;
            position: relative;
        }

        .illustration-container {
            width: 420px;
            height: 320px;
            position: relative;
        }

        .illustration-card {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
            padding: 20px;
        }

        .illustration-card.large {
            width: 280px;
            height: 200px;
            top: 40px;
            left: 60px;
        }

        .illustration-card.small {
            width: 140px;
            height: 100px;
            top: 20px;
            left: 0;
        }

        .illustration-card.mini {
            width: 120px;
            height: 80px;
            bottom: 40px;
            right: 20px;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .card-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-color);
            opacity: 0.8;
        }

        .card-title {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .card-content {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card-line {
            height: 3px;
            background: linear-gradient(90deg, rgba(37, 99, 235, 0.3), rgba(139, 92, 246, 0.2));
            border-radius: 2px;
        }

        .card-line.short {
            width: 60%;
        }

        .card-line.medium {
            width: 80%;
        }

        .card-line.long {
            width: 100%;
        }

        .decoration-dots {
            position: absolute;
            top: 100px;
            right: 40px;
        }

        .decoration-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(37, 99, 235, 0.3);
        }

        .decoration-dot:nth-child(1) { top: 0; left: 0; }
        .decoration-dot:nth-child(2) { top: 16px; left: 20px; }
        .decoration-dot:nth-child(3) { top: 32px; left: 8px; }

        .orbit-line {
            position: absolute;
            width: 120px;
            height: 80px;
            border: 1px dashed rgba(37, 99, 235, 0.2);
            border-radius: 50%;
            bottom: 20px;
            left: 80px;
        }

        /* 入口卡片 */
        .features-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin: 0 auto;
        }

        .feature-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 36px;
            display: flex;
            align-items: center;
            gap: 24px;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: var(--shadow-sm);
        }

        .feature-card:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }

        .feature-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .feature-icon.task {
        }

        .feature-icon.project {
        }

        .feature-icon.literature {
        }

        .feature-icon.search {
        }

        .feature-icon.report {
        }

        .feature-icon.sop {
        }

        .feature-icon.software {
        }

        .feature-icon.writing {
        }

        .feature-content {
            flex: 1;
            padding-left: 20px;
        }

        .feature-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .feature-desc {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .feature-arrow {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .feature-card:hover .feature-arrow {
            background: rgba(37, 99, 235, 0.1);
            color: var(--accent-color);
            transform: translateX(4px);
        }

        /* 底部 */
        .footer {
            padding: 48px 24px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }

        /* 文档页面 */
        .doc-page {
            display: none;
        }

        /* 搜索图标 SVG */
        .search-icon {
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .hero-section {
                flex-direction: column;
                text-align: center;
                gap: 40px;
            }

            .hero-title {
                font-size: 32px;
            }

            .hero-actions {
                justify-content: center;
            }

            .features-grid {
                grid-template-columns: repeat(1, 1fr);
            }
        }
    </style>
</head>

            report: [
                { name: '周报', children: [
                    { name: '2024年第1周', file: 'week1.md' },
                    { name: '2024年第2周', file: 'week2.md' }
                ]},
                { name: '月报', file: 'monthly.md' }
            ],
            sop: [
                { name: '实验室安全', file: '实验室安全.md' },
                { name: '仪器操作', children: [
                    { name: 'HPLC操作规程', file: 'hplc.md' },
                    { name: '离心机使用', file: 'centrifuge.md' }
                ]}
            ],
            software: [
                { name: 'ChemDraw', file: 'chemdraw.md' },
                { name: 'Origin', file: 'origin.md' }
            ],
            writing: [
                { name: '论文草稿', children: [
                    { name: '引言部分', file: 'introduction.md' },
                    { name: '方法部分', file: 'methods.md' }
                ]}
            ]
        };

        // 渲染导航树
        function renderNavTree(items, level = 0) {
            let html = '';
            items.forEach(item => {
                if (item.children) {
                    html += `
                        <div style="padding: 8px ${16 + level * 16}px; display: flex; align-items: center; cursor: pointer; color: #1e293b; font-size: 14px;" onclick="toggleFolder(this)">
                            <span style="flex: 1;">${item.name}</span>
                            <span style="color: #94a3b8; font-size: 12px;">▶</span>
                        </div>
                        <div class="tree-children" style="display: none; padding-left: 16px; border-left: 1px solid #e2e8f0; margin-left: 12px;">
                            ${renderNavTree(item.children, level + 1)}
                        </div>
                    `;
                } else {
                    html += `
                        <div style="padding: 7px ${16 + level * 16}px; cursor: pointer; color: #64748b; font-size: 14px;" onclick="openFile('${item.file}', '${item.name}')">
                            ${item.name}
                        </div>
                    `;
                }
            });
            return html;
        }

        // 切换文件夹
        function toggleFolder(element) {
            const arrow = element.querySelector('span:last-child');
            const children = element.nextElementSibling;
            arrow.textContent = arrow.textContent === '▶' ? '▼' : '▶';
            children.style.display = children.style.display === 'none' ? 'block' : 'none';
        }

        // 打开文件
        function openFile(file, name) {
            document.getElementById('docTitle').textContent = name;
        }

        // 切换标签
        function switchTab(tab) {
            document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
            
            if (tab === 'home') {
                document.querySelector('.home-content').style.display = 'block';
                document.getElementById('docPage').style.display = 'none';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                document.querySelector('.home-content').style.display = 'none';
                document.getElementById('docPage').style.display = 'block';
                
                // 更新导航树
                const items = navData[tab] || [];
                document.getElementById('navTree').innerHTML = renderNavTree(items);
            }
        }

        // 副标题轮播
        const subtitles = [
            '以 Markdown 为核，沉淀知效，专注研发。',
            '本地优先，文件即知识库，无需数据库。',
            '多级导航自动映射，零配置维护。',
            '所见即所得编辑，保留标准 Markdown。',
            '多工具共享同一目录，无需导入导出。',
            'AI 排版助手，一键美化文档结构。'
        ];
        let subIdx = 0;
        const subEl = document.getElementById('heroSubtitle');
        if (subEl) {
            setInterval(() => {
                const nextIdx = (subIdx + 1) % subtitles.length;
                subEl.classList.add('slide-out');
                setTimeout(() => {
                    subEl.textContent = subtitles[nextIdx];
                    subEl.classList.remove('slide-out');
                    subEl.classList.add('slide-in');
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            subEl.classList.remove('slide-in');
                        });
                    });
                    subIdx = nextIdx;
                }, 400);
            }, 4000);
        }

        // 主题切换
        document.getElementById('themeToggle').addEventListener('click', function() {
            this.classList.toggle('dark');
        });

        // 标签点击事件
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                switchTab(this.dataset.tab);
            });
        });
    </script>
</body>
</html>
